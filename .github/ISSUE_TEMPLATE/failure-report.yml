name: Output failure report
description: Share a redacted failure in dynamic routing, human cadence, semantic fidelity, source fit, or factual boundaries.
title: "[Failure]: "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for testing Calm Agent. Public issues are searchable. Use a synthetic or redacted example and never paste a credential or full private conversation.
  - type: input
    id: model
    attributes:
      label: Model and surface
      description: For example, ChatGPT web, Gemini Gem, DeepSeek web, Codex, or Cursor.
      placeholder: ChatGPT web
    validations:
      required: true
  - type: input
    id: adapter
    attributes:
      label: Adapter or installation method
      placeholder: adapters/universal-copy-paste-prompt.md
    validations:
      required: true
  - type: textarea
    id: prompt
    attributes:
      label: Minimal redacted prompt
      description: Replace names, companies, paths, URLs, and private events with neutral placeholders.
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Output that failed
      description: Include only the part needed to understand the failure.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What would have been better?
      description: A short judgment is enough. A full rewrite is optional.
    validations:
      required: true
  - type: dropdown
    id: failure_type
    attributes:
      label: Main failure type
      options:
        - Too polished or templated
        - Too long or over-structured
        - Too literary
        - Too cold or too therapeutic
        - Weak judgment
        - Unsupported or outdated claim
        - Wrong or mismatched source
        - Wrong moment routing or evidence level
        - Semantic rewrite drift
        - Privacy or boundary issue
        - Other
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Public-data check
      options:
        - label: I removed credentials, personal identifiers, private links, and unnecessary conversation history.
          required: true
        - label: I have permission to share every remaining third-party detail.
          required: true
